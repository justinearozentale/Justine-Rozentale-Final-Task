name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  
jobs:
  test:
    name: Playwright project
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false 
      matrix:
        # 🎯 Dynamic matrix matching your config projects array
        project: [ 'API Tests', 'chromium', 'webkit' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm

    - name: Install dependencies
      run: npm ci
  
    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

    - name: Install Playwright Browsers (cache miss)
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        if [ "${{ matrix.project }}" = "webkit" ]; then
          npx playwright install --with-deps webkit
        else
          npx playwright install --with-deps chromium
        fi
    
    - name: Install Playwright Browsers (cache hit)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: |
        if [ "${{ matrix.project }}" = "webkit" ]; then
          npx playwright install-deps webkit
        else
          npx playwright install-deps chromium
        fi

    - name: Run Playwright tests
      continue-on-error: true
      run: npx playwright test --project="${{ matrix.project }}" --workers=1
      env:
        BASE_URL: https://automationexercise.com/

    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ matrix.project }}
        path: playwright-report/
        retention-days: 14

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: test-results-${{ matrix.project }}
        path: test-results/
        retention-days: 14
    
    - name: Generate Allure HTML report
      uses: simple-elf/allure-report-action@master
      if: ${{ !cancelled() }}
      with:
        allure_results: allure-results
        allure_report: allure-report
        allure_history: allure-history
        keep_reports: 10

    - name: Upload Allure HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-report-${{ matrix.project }}
        path: allure-report/
        retention-days: 14